<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Audit Report Lab</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; padding: 40px; }
        h1 { color: #00d4ff; text-align: center; }
        .box { background: #111; border: 2px solid #00d4ff; padding: 25px; border-radius: 12px; margin: 30px 0; }
        input, button { padding: 10px; margin: 5px; border-radius: 8px; border: none; font-family: monospace; }
        input { background: #222; color: #00ff41; width: 60%; }
        button { background: #00d4ff; color: #000; font-weight: bold; cursor: pointer; }
        button:hover { background: #00ff41; }
        .output { background: #000; padding: 15px; border-radius: 8px; border: 1px solid #00d4ff; margin-top: 10px; white-space: pre-wrap; }
        .footer { text-align: center; margin-top: 40px; color: #666; }
    </style>
</head>
<body>
    <img src="logo.vs.jpg" alt="Audit GIF" style="display: block; margin: 0 auto; width: 200px; border-radius: 10px;">
    <h1> Audit Report Generator</h1>
    <div class="box">
        <h2>Enter Scan Results</h2>
        <input type="text" id="targetName" placeholder="Target Name" value="company.com">
        <input type="number" id="critical" placeholder="Critical" value="2">
        <input type="number" id="high" placeholder="High" value="5">
        <input type="number" id="medium" placeholder="Medium" value="8">
        <input type="number" id="low" placeholder="Low" value="12">
        <button onclick="generateAuditReport()">Generate Report</button>
        <div class="output" id="reportOutput">Report will appear here...</div>
    </div>
    <div class="footer">Audit Report Lab — Practical Phase</div>

    <script>
        function generateAuditReport() {
            const target = document.getElementById('targetName').value || 'Unknown';
            const critical = document.getElementById('critical').value || 0;
            const high = document.getElementById('high').value || 0;
            const medium = document.getElementById('medium').value || 0;
            const low = document.getElementById('low').value || 0;

            document.getElementById('reportOutput').textContent = 
`Vulnerability Assessment & Audit Report
----------------------------------------
Target: ${target}
Date: ${new Date().toLocaleDateString()}
----------------------------------------
Vulnerability Summary:
Critical: ${critical}
High: ${high}
Medium: ${medium}
Low: ${low}
----------------------------------------
Top Findings:
- SQL Injection on /login (Critical)
- XSS on /search (High)
- Missing CSP Header (Medium)
- Directory Listing Enabled (Low)
----------------------------------------
Recommendations:
- Patch Critical & High issues within 48 hours.
- Implement security headers.
- Conduct regular penetration testing.
----------------------------------------
Report Generated Successfully.`;
        }
    </script>
</body>
</html>
