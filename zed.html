
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> ZAP Lab</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; padding: 40px; }
        h1 { color: #ff6b6b; text-align: center; }
        .box { background: #111; border: 2px solid #ff6b6b; padding: 25px; border-radius: 12px; margin: 30px 0; }
        input, button { padding: 10px; margin: 5px; border-radius: 8px; border: none; font-family: monospace; }
        input { background: #222; color: #00ff41; width: 60%; }
        button { background: #ff6b6b; color: #000; font-weight: bold; cursor: pointer; }
        button:hover { background: #00ff41; }
        .output { background: #000; padding: 15px; border-radius: 8px; border: 1px solid #ff6b6b; margin-top: 10px; white-space: pre-wrap; }
        .footer { text-align: center; margin-top: 40px; color: #666; }
    </style>
</head>
<body>
    <img src="logo.vs.jpg" alt="ZAP GIF" style="display: block; margin: 0 auto; width: 200px; border-radius: 10px;">
    <h1> ZAP Vulnerability Scanner (Simulation)</h1>
    <div class="box">
        <h2>Target URL Scanner</h2>
        <input type="text" id="targetUrl" placeholder="Enter URL: https://example.com" value="https://example.com">
        <button onclick="scan()">Start Scan</button>
        <div class="output" id="scanOutput">Waiting for scan...</div>
    </div>
    <div class="box">
        <h2>Generated Report</h2>
        <button onclick="generateReport()">Generate Report</button>
        <div class="output" id="reportOutput">Report will appear here...</div>
    </div>
    <div class="footer">ZAP Lab — Practical Phase</div>

    <script>
        function scan() {
            const url = document.getElementById('targetUrl').value;
            if (!url) return alert('Please enter a URL');
            document.getElementById('scanOutput').textContent = 'Scanning: ' + url + ' ...';
            setTimeout(() => {
                document.getElementById('scanOutput').textContent = 
`Scan Complete for: ${url}
SQL Injection: Not Found
XSS: Found (2)
Broken Auth: Found (1)
Missing Headers: Found (4)
Info Disclosure: Found (3)`;
            }, 2000);
        }
        function generateReport() {
            document.getElementById('reportOutput').textContent = 
`Vulnerability Assessment Report
Date: ${new Date().toLocaleDateString()}
Target: https://example.com
------------------------------------
Critical: 0
High: 3
Medium: 4
Low: 3
------------------------------------
Recommendations:
- Fix XSS vulnerabilities immediately.
- Add security headers (CSP, HSTS).
- Implement proper authentication.`;
        }
    </script>
</body>
</html>
