
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Data Encryption</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; padding: 40px; }
        h1 { color: #ffaa00; text-align: center; }
        .box { background: #111; border: 2px solid #ffaa00; padding: 25px; border-radius: 12px; margin: 30px 0; }
        input, button { padding: 10px; margin: 5px; border-radius: 8px; border: none; font-family: monospace; }
        input { background: #222; color: #00ff41; width: 60%; }
        button { background: #ffaa00; color: #000; font-weight: bold; cursor: pointer; }
        button:hover { background: #00ff41; }
        .output { background: #000; padding: 15px; border-radius: 8px; border: 1px solid #ffaa00; margin-top: 10px; white-space: pre-wrap; }
        .footer { text-align: center; margin-top: 40px; color: #666; }
    </style>
</head>
<body>
    <img src="logo.vs.jpg" alt="Encryption GIF" style="display: block; margin: 0 auto; width: 200px; border-radius: 10px;">
    <h1> Data Encryption Lab</h1>
    <div class="box">
        <h2>Encrypt & Decrypt Text (Base64)</h2>
        <input type="text" id="textInput" placeholder="Enter text to encrypt...">
        <button onclick="encrypt()">Encrypt</button>
        <button onclick="decrypt()">Decrypt</button>
        <div class="output" id="output">Result will appear here...</div>
    </div>
    <div class="box">
        <h2>Base64 Encode / Decode</h2>
        <input type="text" id="base64Input" placeholder="Enter text...">
        <button onclick="encodeBase64()">Encode</button>
        <button onclick="decodeBase64()">Decode</button>
        <div class="output" id="base64Output">Result will appear here...</div>
    </div>
    <div class="footer">Encryption Lab — Practical Phase</div>

    <script>
        function encrypt() {
            const text = document.getElementById('textInput').value;
            if (!text) return alert('Please enter text');
            document.getElementById('output').textContent = 'Encrypted: ' + btoa(text);
        }
        function decrypt() {
            const text = document.getElementById('textInput').value;
            if (!text) return alert('Please enter encrypted text');
            try {
                document.getElementById('output').textContent = 'Decrypted: ' + atob(text);
            } catch {
                document.getElementById('output').textContent = 'Invalid encrypted text';
            }
        }
        function encodeBase64() {
            const text = document.getElementById('base64Input').value;
            if (!text) return alert('Please enter text');
            document.getElementById('base64Output').textContent = 'Encoded: ' + btoa(text);
        }
        function decodeBase64() {
            const text = document.getElementById('base64Input').value;
            if (!text) return alert('Please enter encoded text');
            try {
                document.getElementById('base64Output').textContent = 'Decoded: ' + atob(text);
            } catch {
                document.getElementById('base64Output').textContent = 'Invalid Base64 text';
            }
        }
    </script>
</body>
</html>
